incarnation: collektive

variables:
  connectWithinDistance: &connectWithinDistance 10.0
  robotSafeMargin: &robotSafeMargin 1.0
  robotMaxSpeed: &robotMaxSpeed 2.0
  moveTargetTime1: &moveTargetTime1 40.0
  moveTargetTime2: &moveTargetTime2 90.0
  timeDistribution: &timeDistribution 100.0 # times in a second > 100 = 10 ms
  controlPeriodMS: &controlPeriodMS 100.0 #ms
  constraintPrefix:
    formula: |
      "qp"
  logEnabled:
    formula: "false"
  rhoADMM:
    language: kotlin
    formula: 10.0
  rhoResidual:
    language: kotlin
    formula: 0.5
  rhoSlack:
    language: kotlin
    formula: 2.0
  primalTolerance:
    language: kotlin
    formula: 1e-2
  dualTolerance:
    language: kotlin
    formula: 1e-2
  QPSettings: &QPSettings
    language: kotlin
    formula: |
      import it.unibo.collektive.alchemist.device.SimulationQpSettings
      import it.unibo.collektive.admm.Tolerance
      val tolerance = Tolerance(primalTolerance, dualTolerance)
      SimulationQpSettings("qp", false, rhoADMM, rhoResidual, rhoSlack, tolerance)

network-model:
  type: ConnectWithinDistance
  parameters: [*connectWithinDistance]

_pool: &program
  - time-distribution: *timeDistribution
    type: Event
    actions:
      - type: RunCollektiveProgram
        parameters: [ it.unibo.collektive.entrypoints.NoObstacleKt.noObstacleEntrypoint ]
      - type: SpeedToTarget
        parameters: []

environment:
  type: Continuous2DEnvironment
  parameters: [ ]
  global-programs:
    - time-distribution:
        type: Trigger
        parameters: [ *moveTargetTime1 ]
      type: MoveTarget
      parameters:
        - 15.0
        - 0.0
        - 1
    - time-distribution:
        type: Trigger
        parameters: [ *moveTargetTime2 ]
      type: MoveTarget
      parameters:
        - 0.0
        - 15.0
        - 1

deployments:
  - type: Point
    parameters: [ 0, 0 ]
    contents:
      - molecule: Robot
        concentration: true
      - molecule: MaxSpeed
        concentration: *robotMaxSpeed
      - molecule: SafeMargin
        concentration: *robotSafeMargin
      - molecule: TargetID
        concentration: 1
      - molecule: TimeDistribution
        concentration: *timeDistribution
      - molecule: ControlPeriodMS
        concentration: *controlPeriodMS
    programs:
      - *program
    properties:
      - type: it.unibo.collektive.alchemist.device.sensors.impl.LocationSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.TimeSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.SolverProperty
        parameters: [ *QPSettings ]

  - type: Point
    parameters: [ 7, 0 ]
    contents:
      - molecule: Robot
        concentration: true
      - molecule: MaxSpeed
        concentration: *robotMaxSpeed
      - molecule: SafeMargin
        concentration: *robotSafeMargin
      - molecule: TargetID
        concentration: 1
      - molecule: TimeDistribution
        concentration: *timeDistribution
      - molecule: ControlPeriodMS
        concentration: *controlPeriodMS
    programs:
      - *program
    properties:
      - type: it.unibo.collektive.alchemist.device.sensors.impl.LocationSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.TimeSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.SolverProperty
        parameters: [ *QPSettings ]

  - type: Point
    parameters: [ 13, 0 ]
    contents:
      - molecule: Robot
        concentration: true
      - molecule: MaxSpeed
        concentration: *robotMaxSpeed
      - molecule: SafeMargin
        concentration: *robotSafeMargin
      - molecule: TargetID
        concentration: 2
      - molecule: TimeDistribution
        concentration: *timeDistribution
      - molecule: ControlPeriodMS
        concentration: *controlPeriodMS
    programs:
      - *program
    properties:
      - type: it.unibo.collektive.alchemist.device.sensors.impl.LocationSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.TimeSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.SolverProperty
        parameters: [ *QPSettings ]

  - type: Point
    parameters: [ 20, 0 ]
    contents:
      - molecule: Robot
        concentration: true
      - molecule: MaxSpeed
        concentration: *robotMaxSpeed
      - molecule: SafeMargin
        concentration: *robotSafeMargin
      - molecule: TargetID
        concentration: 2
      - molecule: TimeDistribution
        concentration: *timeDistribution
      - molecule: ControlPeriodMS
        concentration: *controlPeriodMS
    programs:
      - *program
    properties:
      - type: it.unibo.collektive.alchemist.device.sensors.impl.LocationSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.TimeSensorProperty
      - type: it.unibo.collektive.alchemist.device.sensors.impl.SolverProperty
        parameters: [ *QPSettings ]

  - type: Point
    parameters: [ 20, 20 ]
    contents:
      - molecule: Target
        concentration: 1

  - type: Point
    parameters: [ 0, 15 ]
    contents:
      - molecule: Target
        concentration: 2
